<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KinSentry — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0D1B3E;
      --blue:      #1565C0;
      --blue-dark: #0D47A1;
      --teal:      #1D9E75;
      --red:       #EF4444;
      --bg:        #F5F6F8;
      --surface:   #FFFFFF;
      --border:    rgba(0,0,0,0.08);
      --text:      #0D1B3E;
      --text-2:    #5A6478;
      --text-3:    #9BA3B4;
      --input-bg:  #FFFFFF;
      --radius:    12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: var(--navy); padding: 14px 32px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-img { width: 28px; height: 28px; object-fit: contain; }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; text-decoration: none; }
    .header-tagline { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.4); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }

    .card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 420px;
    }
    .card-logo { width: 48px; height: 48px; object-fit: contain; display: block; margin: 0 auto 16px; }
    .card-title { font-family: 'DM Serif Display', serif; font-size: 22px; text-align: center; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: var(--text-2); text-align: center; line-height: 1.6; margin-bottom: 24px; }

    .field-group { margin-bottom: 14px; }
    label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; }
    input[type=password], input[type=text] {
      width: 100%; padding: 11px 14px;
      background: var(--input-bg); border: 0.5px solid var(--border);
      border-radius: var(--radius); font-size: 14px;
      color: var(--text); font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(21,101,192,0.1); }
    input::placeholder { color: var(--text-3); }

    .strength-bar { height: 3px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }

    .btn-submit {
      width: 100%; background: var(--blue); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 13px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s; margin-top: 4px; margin-bottom: 12px;
    }
    .btn-submit:hover { background: var(--blue-dark); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .msg.error   { background: rgba(239,68,68,0.08); border: 0.5px solid rgba(239,68,68,0.2); color: #B91C1C; display: block; }
    .msg.success { background: rgba(29,158,117,0.08); border: 0.5px solid rgba(29,158,117,0.2); color: #065F46; display: block; }

    .back-link { text-align: center; font-size: 13px; color: var(--text-2); }
    .back-link a { color: var(--blue); text-decoration: none; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { padding: 20px; text-align: center; }
    footer a { font-size: 11px; color: var(--text-3); text-decoration: none; margin: 0 8px; }
  </style>
</head>
<body>

<header>
  <img class="logo-img" src="images/logo-nav.png" alt="KinSentry">
  <a href="/" class="logo-text">KinSentry</a>
  <span class="header-tagline">Secure today. Safer tomorrow.</span>
</header>

<main>
  <div class="card" id="main-card">
    <img class="card-logo" src="images/logo-nav.png" alt="KinSentry">
    <div class="card-title" id="card-title">Reset your password</div>
    <div class="card-desc" id="card-desc">Choose a new password for your KinSentry account.</div>

    <div class="msg" id="msg"></div>

    <div id="form-area">
      <div class="field-group">
        <label>
          New password
          <button type="button" id="toggle-pw" style="background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;font-family:inherit;padding:0;">Show</button>
        </label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
      <div class="field-group">
        <label>Confirm new password</label>
        <input type="password" id="password-confirm" placeholder="Repeat your new password" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="btn-submit">Set new password →</button>
    </div>

    <div class="back-link"><a href="/signup.html?mode=login">← Back to sign in</a></div>
  </div>
</main>

<footer>
  <a href="/privacy.html">Privacy</a>
  <a href="/terms.html">Terms</a>
  <a href="/support.html">Support</a>
</footer>

<script>
const API = 'https://api.kinsentry.com';

// ── Read token from URL ───────────────────────────────────────────────────────
const token = new URLSearchParams(location.search).get('token');
const msgEl = document.getElementById('msg');

if (!token) {
  msgEl.className = 'msg error';
  msgEl.textContent = 'Invalid reset link. Please request a new password reset from the sign-in page.';
  document.getElementById('form-area').style.display = 'none';
}

// ── Password strength indicator ───────────────────────────────────────────────
document.getElementById('password').addEventListener('input', function() {
  const val = this.value;
  const fill = document.getElementById('strength-fill');
  let strength = 0;
  if (val.length >= 8)  strength++;
  if (val.length >= 12) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;
  const colors = ['', '#EF4444', '#F97316', '#EAB308', '#22C55E', '#16A34A'];
  const widths  = ['0%', '20%', '40%', '60%', '80%', '100%'];
  fill.style.width      = widths[strength];
  fill.style.background = colors[strength];
});

// ── Show/hide password ────────────────────────────────────────────────────────
document.getElementById('toggle-pw').addEventListener('click', () => {
  const inp = document.getElementById('password');
  const btn = document.getElementById('toggle-pw');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
});

// ── Submit ────────────────────────────────────────────────────────────────────
document.getElementById('btn-submit').addEventListener('click', async () => {
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('password-confirm').value;

  msgEl.className = 'msg';

  if (password.length < 8) {
    msgEl.className = 'msg error';
    msgEl.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (password !== confirm) {
    msgEl.className = 'msg error';
    msgEl.textContent = 'Passwords do not match.';
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Setting new password…';

  try {
    const res  = await fetch(`${API}/api/auth/reset-password`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, password })
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.className   = 'msg error';
      msgEl.textContent = data.message || 'Reset failed. Please request a new link.';
      btn.disabled      = false;
      btn.textContent   = 'Set new password →';
      return;
    }

    // Success — show confirmation and redirect to login
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('card-title').textContent  = 'Password updated! ✓';
    document.getElementById('card-desc').textContent   = 'Your password has been changed. Redirecting you to sign in…';
    msgEl.className   = 'msg success';
    msgEl.textContent = '✓ Password successfully changed. Redirecting…';

    // Clear ks_user from localStorage so they sign in fresh
    localStorage.removeItem('ks_user');

    setTimeout(() => {
      window.location.href = '/signup.html?mode=login';
    }, 2000);

  } catch(e) {
    msgEl.className   = 'msg error';
    msgEl.textContent = 'Could not connect. Please check your connection and try again.';
    btn.disabled      = false;
    btn.textContent   = 'Set new password →';
  }
});

// ── Enter key ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-submit').click(); });
</script>
</body>
</html>
